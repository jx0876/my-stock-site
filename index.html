// 圖表自訂插件：表格點擊時，在圖上畫一條垂直藍線並標日期
const verticalLinePlugin = {
  id: 'verticalLine',
  afterDraw: (chart) => {
    const cfg = chart.options.plugins?.verticalLine;
    if (!cfg || cfg.x == null) return;
    const xPx = chart.scales.x.getPixelForValue(cfg.x);
    if (xPx < chart.chartArea.left || xPx > chart.chartArea.right) return;
    const ctx = chart.ctx;
    ctx.save();
    ctx.beginPath();
    ctx.setLineDash([5, 3]);
    ctx.moveTo(xPx, chart.chartArea.top);
    ctx.lineTo(xPx, chart.chartArea.bottom);
    ctx.lineWidth = 2;
    ctx.strokeStyle = '#2563eb';
    ctx.stroke();
    ctx.restore();
    // 日期標籤
    const d = new Date(cfg.x);
    const label = `${d.getMonth()+1}/${d.getDate()}`;
    ctx.save();
    ctx.fillStyle = '#2563eb';
    ctx.fillRect(xPx - 22, chart.chartArea.top - 16, 44, 14);
    ctx.fillStyle = 'white';
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(label, xPx, chart.chartArea.top - 5);
    ctx.restore();
  }
};
Chart.register(verticalLinePlugin);

async function fetchPriceData(code) {
  // 抓 9 個月資料（為了讓 MA60 與其他指標有足夠樣本）
  const start = new Date();
  start.setMonth(start.getMonth() - 9);
  const startStr = start.toISOString().slice(0, 10);
  const url = `${FINMIND_BASE}?dataset=TaiwanStockPrice&data_id=${encodeURIComponent(code)}&start_date=${startStr}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const json = await res.json();
  if (json.status !== 200) throw new Error(json.msg || 'API 回傳錯誤');
  if (!json.data || json.data.length === 0) {
    throw new Error('找不到此股票代號的歷史資料，請確認代號正確');
  }
  return json.data;
}

// 取得股票中文名稱（一天快取一次）
let nameMapPromise = null;
async function loadNameMap() {
  if (nameMapPromise) return nameMapPromise;
  nameMapPromise = (async () => {
    try {
      const today = new Date().toISOString().slice(0, 10);
      const cached = JSON.parse(localStorage.getItem(NAME_CACHE_KEY) || 'null');
      if (cached && cached.date === today && cached.map) return cached.map;
    } catch {}
    try {
      const res = await fetch(`${FINMIND_BASE}?dataset=TaiwanStockInfo`);
      const json = await res.json();
      const map = {};
      if (json.data) {
        json.data.forEach(d => {
          if (d.stock_id) map[d.stock_id] = {
            name: d.stock_name || d.stock_id,
            industry: d.industry_category || '',
            type: d.type || '' // twse=上市, tpex=上櫃
          };
        });
      }
      try {
        localStorage.setItem(NAME_CACHE_KEY, JSON.stringify({
          date: new Date().toISOString().slice(0, 10),
          map
        }));
      } catch {}
      return map;
    } catch {
      return {};
    }
  })();
  return nameMapPromise;
}

async function getStockName(code) {
  const map = await loadNameMap();
  return map[code]?.name || code;
}

async function getStockInfo(code) {
  const map = await loadNameMap();
  return map[code] || { name: code, industry: '', type: '' };
}

let liveTimer = null;

async function fetchLiveQuote(code) {
  if (!WORKER_URL) return null;
  try {
    const r = await fetch(`${WORKER_URL}/api/quote?code=${encodeURIComponent(code)}`);
    if (!r.ok) return null;
    return await r.json();
  } catch { return null; }
}

function applyLiveQuote(data) {
  if (!data || data.price == null) return;
  const priceEl  = document.getElementById('livePrice');
  const changeEl = document.getElementById('liveChange');
  const timeEl   = document.getElementById('liveTime');
  if (!priceEl || !changeEl) return;
  const chg = data.change ?? 0;
  const pct = data.change_pct ?? 0;
  const sign = chg > 0 ? '▲' : chg < 0 ? '▼' : '–';
  const cls  = chg > 0 ? 'signal-bull' : chg < 0 ? 'signal-bear' : 'signal-neutral';
  priceEl.className  = priceEl.className.replace(/signal-(bull|bear|neutral)/g, '').trim() + ' ' + cls;
  changeEl.className = changeEl.className.replace(/signal-(bull|bear|neutral)/g, '').trim() + ' ' + cls;
  priceEl.textContent  = data.price.toFixed(2);
  changeEl.textContent = `${sign} ${Math.abs(chg).toFixed(2)} (${Math.abs(pct).toFixed(2)}%)`;
  if (timeEl) {
    const status = data.is_trading ? '即時' : '盤後';
    timeEl.innerHTML = `<span class="inline-block w-2 h-2 ${data.is_trading ? 'bg-red-500 animate-pulse' : 'bg-slate-400'} rounded-full mr-1 align-middle"></span>📡 ${status} ${data.time || ''}`;
  }
}

async function startLiveUpdates(code) {
  if (liveTimer) { clearInterval(liveTimer); liveTimer = null; }
  if (!WORKER_URL) return;
  const tick = async () => {
    const data = await fetchLiveQuote(code);
    if (data) applyLiveQuote(data);
  };
  await tick();
  liveTimer = setInterval(tick, 30000); // 30 秒刷一次
}

// ============================================================
// 消息面：抓 Google 新聞 + 關鍵字情緒分析
// ============================================================
const NEWS_POS = ['大漲','上漲','漲停','漲幅','利多','強勢','突破','新高','創高','看好','加碼','獲利','成長','增加','業績','訂單','大單','升評','調升','大賺','亮眼','超預期','受惠','拉抬','轉強','轉好','旺季','飆','登頂','爆量','看俏'];
const NEWS_NEG = ['大跌','下跌','跌停','跌幅','利空','弱勢','跌破','新低','創低','看壞','減碼','虧損','衰退','減少','滑落','放緩','警訊','降評','調降','賣壓','失利','衝擊','低於','不如預期','受挫','拉回','轉弱','淡季','慘','重摔','跳水','看淡','疲軟'];

function newsSentiment(title) {
  let pos = 0, neg = 0;
  NEWS_POS.forEach(w => { if (title.includes(w)) pos++; });
  NEWS_NEG.forEach(w => { if (title.includes(w)) neg++; });
  const score = pos - neg;
  if (score > 0)  return { tag: '利多', score, cls: 'bg-red-100 text-red-700' };
  if (score < 0)  return { tag: '利空', score, cls: 'bg-green-100 text-green-700' };
  return { tag: '中性', score: 0, cls: 'bg-slate-100 text-slate-500' };
}

function splitTitleSource(rawTitle) {
  const idx = rawTitle.lastIndexOf(' - ');
  if (idx > 0) return { title: rawTitle.slice(0, idx), source: rawTitle.slice(idx + 3) };
  return { title: rawTitle, source: '' };
}

function relativeTime(pubDateStr) {
  if (!pubDateStr) return '';
  const date = new Date(pubDateStr.includes('T') ? pubDateStr : pubDateStr.replace(' ', 'T') + 'Z');
  const diff = (Date.now() - date.getTime()) / 1000;
  if (diff < 60) return '剛剛';
  if (diff < 3600) return Math.floor(diff / 60) + ' 分鐘前';
  if (diff < 86400) return Math.floor(diff / 3600) + ' 小時前';
  if (diff < 86400 * 7) return Math.floor(diff / 86400) + ' 天前';
  return date.toLocaleDateString('zh-TW');
}

async function fetchNews(query, count = 10) {
  const rssUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(query)}&hl=zh-TW&gl=TW&ceid=TW:zh-Hant`;
  const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}&count=${count}`;
  const res = await fetch(apiUrl);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const json = await res.json();
  if (json.status !== 'ok') throw new Error(json.message || 'RSS error');
  return json.items || [];
}

async function renderNewsSection(query, containerId) {
  const box = document.getElementById(containerId);
  if (!box) return;
  box.innerHTML = '<div class="text-sm text-slate-500 text-center py-6"><span class="loader inline-block align-middle mr-2"></span>抓取最新消息…</div>';
  try {
    const items = await fetchNews(query, 10);
    if (!items.length) {
      box.innerHTML = '<p class="text-sm text-slate-500 text-center py-4">查無相關新聞</p>';
      return;
    }
    let totalScore = 0;
    const list = items.map(item => {
      const { title, source } = splitTitleSource(item.title || '');
      const s = newsSentiment(item.title || '');
      totalScore += s.score;
      const safeTitle = title.replace(/</g, '&lt;');
      return `
        <a href="${item.link}" target="_blank" rel="noopener noreferrer"
           class="block p-3 hover:bg-slate-50 transition border-b border-slate-100 last:border-b-0">
          <div class="flex items-start gap-2">
            <span class="px-2 py-0.5 ${s.cls} rounded text-[10px] font-bold whitespace-nowrap shrink-0 mt-0.5">${s.tag}</span>
            <div class="flex-1 min-w-0">
              <div class="text-sm font-medium text-slate-800 leading-snug">${safeTitle}</div>
              <div class="text-xs text-slate-400 mt-1">
                ${source ? `<span class="font-bold text-slate-500">${source}</span> · ` : ''}<span>${relativeTime(item.pubDate)}</span>
              </div>
            </div>
          </div>
        </a>
      `;
    }).join('');

    const overall = totalScore > 1 ? { tag: '偏多', emoji: '🔴', cls: 'bg-rose-50 border-rose-200 text-rose-700' }
                  : totalScore < -1 ? { tag: '偏空', emoji: '🟢', cls: 'bg-emerald-50 border-emerald-200 text-emerald-700' }
                  : { tag: '中性 / 訊號不明', emoji: '🟡', cls: 'bg-amber-50 border-amber-200 text-amber-700' };

    box.innerHTML = `
      <div class="border rounded-xl p-3 mb-3 ${overall.cls}">
        <div class="flex items-center gap-2 flex-wrap">
          <span class="text-xl">${overall.emoji}</span>
          <span class="font-black">近期消息面：${overall.tag}</span>
          <span class="text-xs opacity-75">（總分 ${totalScore >= 0 ? '+' : ''}${totalScore}・依標題關鍵字粗略判斷）</span>
        </div>
      </div>
      <div class="bg-white rounded-xl border border-slate-100 overflow-hidden">${list}</div>
      <p class="text-xs text-slate-400 mt-2 text-center">來源：Google 新聞・點任一則開新分頁查看原文</p>
    `;
  } catch (err) {
    box.innerHTML = `<p class="text-sm text-red-500 text-center py-4">新聞抓取失敗（${err.message}），稍後再試</p>`;
  }
}

// ============================================================
// 指標計算
// ============================================================
function sma(arr, n) {
  const out = new Array(arr.length).fill(null);
  let sum = 0;
  for (let i = 0; i < arr.length; i++) {
    sum += arr[i];
    if (i >= n) sum -= arr[i - n];
    if (i >= n - 1) out[i] = sum / n;
  }
  return out;
}

function calcKD(highs, lows, closes, n = 9) {
  const k = new Array(closes.length).fill(50);
  const d = new Array(closes.length).fill(50);
  for (let i = 0; i < closes.length; i++) {
    if (i < n - 1) continue;
    let hh = -Infinity, ll = Infinity;
    for (let j = i - n + 1; j <= i; j++) {
      if (highs[j] > hh) hh = highs[j];
      if (lows[j] < ll) ll = lows[j];
    }
    const rsv = hh === ll ? 50 : ((closes[i] - ll) / (hh - ll)) * 100;
    k[i] = (k[i - 1] !== undefined ? k[i - 1] : 50) * 2 / 3 + rsv / 3;
    d[i] = (d[i - 1] !== undefined ? d[i - 1] : 50) * 2 / 3 + k[i] / 3;
  }
  return { k, d };
}

function calcRSI(closes, n = 14) {
  const out = new Array(closes.length).fill(null);
  if (closes.length <= n) return out;
  let gain = 0, loss = 0;
  for (let i = 1; i <= n; i++) {
    const diff = closes[i] - closes[i - 1];
    if (diff >= 0) gain += diff; else loss -= diff;
  }
  let avgGain = gain / n, avgLoss = loss / n;
  out[n] = avgLoss === 0 ? 100 : 100 - 100 / (1 + avgGain / avgLoss);
  for (let i = n + 1; i < closes.length; i++) {
    const diff = closes[i] - closes[i - 1];
    const g = diff > 0 ? diff : 0;
    const l = diff < 0 ? -diff : 0;
    avgGain = (avgGain * (n - 1) + g) / n;
    avgLoss = (avgLoss * (n - 1) + l) / n;
    out[i] = avgLoss === 0 ? 100 : 100 - 100 / (1 + avgGain / avgLoss);
  }
  return out;
}

function detectCross(maShort, maLong, lookback = 3) {
  const last = maShort.length - 1;
  for (let i = last; i >= last - lookback && i > 0; i--) {
    if (maShort[i] == null || maLong[i] == null || maShort[i - 1] == null || maLong[i - 1] == null) continue;
    if (maShort[i - 1] <= maLong[i - 1] && maShort[i] > maLong[i]) return { type: 'golden', daysAgo: last - i };
    if (maShort[i - 1] >= maLong[i - 1] && maShort[i] < maLong[i]) return { type: 'death', daysAgo: last - i };
  }
  return null;
}

// ============================================================
// 綜合判斷
// ============================================================
function analyze(closes, highs, lows) {
  const ma5 = sma(closes, 5);
  const ma20 = sma(closes, 20);
  const ma60 = sma(closes, 60);
  const { k, d } = calcKD(highs, lows, closes);
  const rsi = calcRSI(closes);
  const last = closes.length - 1;

  const close = closes[last];
  const ma5v = ma5[last], ma20v = ma20[last], ma60v = ma60[last];
  const kv = k[last], dv = d[last], rsiv = rsi[last];

  // 計分
  let score = 0;
  const reasons = [];
  if (ma20v != null) {
    if (close > ma20v) { score++; reasons.push('股價站上 20 日均線'); }
    else { score--; reasons.push('股價跌破 20 日均線'); }
  }
  if (ma5v != null && ma20v != null) {
    if (ma5v > ma20v) { score++; reasons.push('短均線在長均線之上'); }
    else { score--; reasons.push('短均線在長均線之下'); }
  }
  if (ma20v != null && ma60v != null) {
    if (ma20v > ma60v) { score++; }
    else { score--; }
  }
  if (kv != null && dv != null) {
    if (kv > dv) { score++; reasons.push('KD 指標 K 在 D 之上'); }
    else { score--; reasons.push('KD 指標 K 在 D 之下'); }
  }

  // 超買超賣
  let zone = 'neutral', zoneText = '合理區', zoneHint = '';
  if (rsiv != null && rsiv > 70) { zone = 'overbought'; zoneText = '超買區'; zoneHint = 'RSI 偏高，技術面接近高檔，留意回檔風險'; score--; }
  else if (rsiv != null && rsiv < 30) { zone = 'oversold'; zoneText = '超賣區'; zoneHint = 'RSI 偏低，技術面接近低檔，可留意反彈機會'; score++; }
  else if (kv != null && kv > 80) { zone = 'overbought'; zoneText = '超買區'; zoneHint = 'KD 偏高，短線過熱'; score--; }
  else if (kv != null && kv < 20) { zone = 'oversold'; zoneText = '超賣區'; zoneHint = 'KD 偏低，短線超跌'; score++; }
  else { zoneHint = 'RSI 與 KD 皆在合理區間'; }

  // 黃金 / 死亡交叉
  const cross = detectCross(ma5, ma20);
  if (cross) {
    if (cross.type === 'golden') { score += 2; reasons.unshift(`${cross.daysAgo === 0 ? '今日' : cross.daysAgo + ' 日前'}出現黃金交叉`); }
    else { score -= 2; reasons.unshift(`${cross.daysAgo === 0 ? '今日' : cross.daysAgo + ' 日前'}出現死亡交叉`); }
  }

  // 結論
  let trend = 'neutral', trendText = '盤整', trendEmoji = '🟡';
  if (score >= 3) { trend = 'bull'; trendText = '短期偏多'; trendEmoji = '🔴'; }
  else if (score <= -3) { trend = 'bear'; trendText = '短期偏空'; trendEmoji = '🟢'; }

  // 一句話建議
  let oneLine;
  if (trend === 'bull' && zone === 'overbought') oneLine = '趨勢偏多但已過熱，現價追高需小心';
  else if (trend === 'bull' && zone === 'oversold') oneLine = '低檔偏多訊號出現，技術面可留意';
  else if (trend === 'bull') oneLine = '短期動能偏多，趨勢向上';
  else if (trend === 'bear' && zone === 'oversold') oneLine = '已在超賣區，但趨勢仍弱，建議觀察反彈訊號';
  else if (trend === 'bear' && zone === 'overbought') oneLine = '反彈但中期仍弱，留意賣壓';
  else if (trend === 'bear') oneLine = '短期動能偏空，趨勢向下';
  else if (zone === 'overbought') oneLine = '盤整偏高，注意短線拉回';
  else if (zone === 'oversold') oneLine = '盤整偏低，留意反彈機會';
  else oneLine = '多空不明，盤整等待方向';

  return {
    close, ma5: ma5v, ma20: ma20v, ma60: ma60v, k: kv, d: dv, rsi: rsiv,
    cross, score, trend, trendText, trendEmoji, zone, zoneText, zoneHint,
    oneLine, reasons,
    ma5Arr: ma5, ma20Arr: ma20, ma60Arr: ma60,
    kArr: k, dArr: d, rsiArr: rsi
  };
}

// ============================================================
// 投資建議：根據 trend + zone + cross 給出明確的可買 / 可賣
// ============================================================
function getAction(a) {
  const recentGolden = a.cross && a.cross.type === 'golden' && a.cross.daysAgo <= 5;
  const recentDeath  = a.cross && a.cross.type === 'death'  && a.cross.daysAgo <= 5;

  // 強烈買進
  if (a.trend === 'bull' && a.zone === 'oversold')
    return { tag: '可考慮買進', emoji: '🟢', tone: 'buy', strong: true,
      advice: '低檔出現偏多訊號，技術面是相對划算的進場點，但仍須評估自身資金狀況。' };
  if (a.trend === 'bull' && recentGolden)
    return { tag: '可考慮買進', emoji: '🟢', tone: 'buy', strong: true,
      advice: '剛出現黃金交叉且趨勢偏多，動能由弱轉強，可分批佈局。' };

  // 一般買進
  if (a.trend === 'bull' && a.zone !== 'overbought')
    return { tag: '偏向買進', emoji: '🟢', tone: 'buy', strong: false,
      advice: '趨勢向上、未過熱，可順勢操作，跌破 MA20 再評估。' };

  // 過熱
  if (a.trend === 'bull' && a.zone === 'overbought')
    return { tag: '不宜追高', emoji: '🟠', tone: 'caution', strong: false,
      advice: '趨勢偏多但已過熱，現價追高風險高；持有者可續抱、未進場者等回檔再說。' };

  // 強烈賣出
  if (a.trend === 'bear' && recentDeath)
    return { tag: '建議減碼 / 避開', emoji: '🔴', tone: 'sell', strong: true,
      advice: '剛出現死亡交叉且趨勢偏空，動能由強轉弱，持股可考慮減碼。' };
  if (a.trend === 'bear' && a.zone === 'overbought')
    return { tag: '偏向賣出', emoji: '🔴', tone: 'sell', strong: false,
      advice: '反彈遇壓 + 中期偏空，技術面有逢高出脫的訊號。' };

  // 觀望反彈
  if (a.trend === 'bear' && a.zone === 'oversold')
    return { tag: '觀望止跌', emoji: '🟡', tone: 'hold', strong: false,
      advice: '已超賣但趨勢仍弱，等出現止跌（如紅 K + KD 翻揚）再考慮。' };

  // 純偏空
  if (a.trend === 'bear')
    return { tag: '不宜進場', emoji: '🔴', tone: 'sell', strong: false,
      advice: '中期趨勢向下，避開為宜，等明確止跌訊號。' };

  // 中性 + 過熱
  if (a.zone === 'overbought')
    return { tag: '不宜追高', emoji: '🟠', tone: 'caution', strong: false,
      advice: '盤整偏高，注意短線拉回。' };

  // 中性 + 超賣
  if (a.zone === 'oversold')
    return { tag: '可留意反彈', emoji: '🟡', tone: 'hold', strong: false,
      advice: '盤整偏低，技術面有反彈機會，但無明確趨勢。' };

  // 純中性
  return { tag: '中性觀望', emoji: '🟡', tone: 'hold', strong: false,
    advice: '多空不明、訊號平淡，等候明確方向再行動。' };
}

// ============================================================
// 完整交易計畫：自動計算關鍵價位、量比、進出場條件
// ============================================================
function findKeyLevels(closes, highs, lows) {
  const N = closes.length;
  const cur = closes[N - 1];
  const win = (arr, n) => arr.slice(Math.max(0, N - n));
  const max = arr => Math.max(...arr);
  const min = arr => Math.min(...arr);
  const round2 = v => Math.round(v * 100) / 100;

  const recent20H = max(win(highs, 20));
  const recent60H = max(win(highs, 60));
  const recent20L = min(win(lows, 20));
  const recent60L = min(win(lows, 60));
  const allTimeL  = min(lows);

  // 壓力位（要在現價之上）
  const r1 = recent20H > cur ? recent20H : round2(cur * 1.05);
  const r2 = recent60H > r1 ? recent60H : round2(r1 * 1.06);
  // 支撐位（要在現價之下）
  const s1 = recent20L < cur ? recent20L : round2(cur * 0.95);
  const s2 = recent60L < s1 ? recent60L : round2(s1 * 0.94);
  const strongS = allTimeL < s2 ? allTimeL : round2(s2 * 0.92);

  return {
    breakout: round2(cur), r1: round2(r1), r2: round2(r2),
    s1: round2(s1), s2: round2(s2), strongS: round2(strongS),
  };
}

// 進場合理價格：依趨勢計算 2-3 個價格區間
function calcEntryZones(analysis, levels) {
  const a = analysis;
  const L = levels;
  const cur = a.close;
  const ma20 = a.ma20;
  const zones = [];

  const round2 = v => Math.round(v * 100) / 100;

  if (a.trend === 'bull') {
    // 保守區：靠近支撐 / MA20（首選）
    const baseLow = ma20 != null ? Math.min(L.s1, ma20) : L.s1;
    const baseHigh = ma20 != null ? Math.max(L.s1, ma20) : L.s1 * 1.03;
    zones.push({
      level: 'good',
      name: '保守進場區',
      tag: '✅ 首選',
      from: round2(baseLow),
      to: round2(baseHigh),
      rationale: `等回測${ma20 != null ? ' MA20 / 支撐1 ' : '支撐1 '}不破再進，勝率較高、停損點明確`,
    });

    // 順勢區：現價附近（非過熱時）
    if (a.zone !== 'overbought') {
      zones.push({
        level: 'aggressive',
        name: '順勢進場區',
        tag: '⚠️ 積極',
        from: round2(cur * 0.98),
        to: round2(cur * 1.01),
        rationale: '順勢追多，但需嚴守 S1 停損，不貪心',
      });
    }

    // 不宜區：壓力以上
    if (cur < L.r2) {
      zones.push({
        level: 'avoid',
        name: '不宜追高區',
        tag: '⛔ 避開',
        from: round2(Math.max(cur, L.r1) * 1.05),
        to: round2(L.r2),
        rationale: '價位偏高、拉回機率大，等回測再說',
      });
    }
  } else if (a.trend === 'bear') {
    zones.push({
      level: 'avoid',
      name: '建議觀望',
      tag: '⛔ 不宜',
      from: null, to: null,
      rationale: '趨勢偏空，建議等止跌訊號（紅 K + KD 翻揚 + 量縮）再評估',
    });
    if (a.zone === 'oversold') {
      zones.push({
        level: 'aggressive',
        name: '超跌反彈試單區（高風險）',
        tag: '⚠️ 高風險',
        from: round2(L.strongS),
        to: round2(L.s1),
        rationale: 'RSI/KD 已超賣，僅可小單試多，配合反轉訊號',
      });
    }
  } else {
    // 盤整：高低區間操作
    zones.push({
      level: 'good',
      name: '逢低承接區',
      tag: '✅ 區間下緣',
      from: round2(L.s1),
      to: round2(L.s1 * 1.03),
      rationale: '盤整下緣分批承接，跌破即停損',
    });
    zones.push({
      level: 'avoid',
      name: '逢高減碼區',
      tag: '📤 區間上緣',
      from: round2(L.r1 * 0.97),
      to: round2(L.r1),
      rationale: '盤整上緣，可分批減碼或試空',
    });
  }

  return zones;
}

function calcVolRatio(volumes) {
  const N = volumes.length;
  if (N < 6) return null;
  const today = volumes[N - 1] || 0;
  const last5 = volumes.slice(N - 6, N - 1);
  const avg = last5.reduce((a, b) => a + b, 0) / 5;
  if (!avg) return null;
  return { today, avg, ratio: (today / avg - 1) * 100 };
}

const SCREEN_LIST = [
  '2330','2317','2454','2308','2382','2891','2412','2881','2882','6505',
  '1303','1301','1216','3711','2884','2885','2890','2887','5880','3045',
  '4904','1101','2603','2609','2615','3034','2379','3008','0050','0056'
];
const SCREEN_CACHE_KEY = 'stock_screen_cache_v1';
const SCREEN_TTL_MS = 60 * 60 * 1000; // 1 小時

async function fetchScreening() {
  const start = new Date();
  start.setMonth(start.getMonth() - 5);
  const startStr = start.toISOString().slice(0, 10);
  const nameMap = await loadNameMap();
  const results = [];

  // 6 檔一批，避免一次打太多
  for (let i = 0; i < SCREEN_LIST.length; i += 6) {
    const batch = SCREEN_LIST.slice(i, i + 6);
    const batchOut = await Promise.all(batch.map(async code => {
      try {
        const url = `${FINMIND_BASE}?dataset=TaiwanStockPrice&data_id=${code}&start_date=${startStr}`;
        const res = await fetch(url);
        const json = await res.json();
        if (!json.data || json.data.length < 60) return null;
        const valid = json.data.filter(r => r.close != null && r.max != null && r.min != null);
        if (valid.length < 60) return null;
        const closes = valid.map(r => r.close);
        const highs  = valid.map(r => r.max);
        const lows   = valid.map(r => r.min);
        const an = analyze(closes, highs, lows);
        const action = getAction(an);
        const last = valid[valid.length - 1];
        const prev = valid[valid.length - 2] || last;
        const chgPct = prev.close ? ((last.close - prev.close) / prev.close) * 100 : 0;
        return { code, name: nameMap[code]?.name || code, close: last.close, chgPct, an, action };
      } catch { return null; }
    }));
    results.push(...batchOut.filter(Boolean));
  }
  return results;
}

async function getScreening(forceRefresh = false) {
  if (!forceRefresh) {
    try {
      const cached = JSON.parse(localStorage.getItem(SCREEN_CACHE_KEY) || 'null');
      if (cached && Date.now() - cached.ts < SCREEN_TTL_MS) return cached.results;
    } catch {}
  }
  const results = await fetchScreening();
  try { localStorage.setItem(SCREEN_CACHE_KEY, JSON.stringify({ ts: Date.now(), results })); } catch {}
  return results;
}

function renderScreening(results) {
  const box = document.getElementById('screenContent');
  // 取「可考慮買進 / 偏向買進」的，依 score 由高到低
  const picks = results
    .filter(r => r.action.tone === 'buy')
    .sort((a, b) => b.an.score - a.an.score);

  if (picks.length === 0) {
    box.innerHTML = `
      <div class="text-center py-4">
        <div class="text-3xl mb-2">😴</div>
        <p class="text-sm text-slate-500 font-bold">今天沒有強烈進場訊號</p>
        <p class="text-xs text-slate-400 mt-1">熱門 30 檔目前都不在「偏向買進」的技術面狀態，建議耐心等待。</p>
      </div>`;
    return;
  }

  const card = (r) => {
    const star = r.action.strong ? '<span class="text-xs font-bold text-yellow-600">★</span>' : '';
    const chgCls = r.chgPct >= 0 ? 'signal-bull' : 'signal-bear';
    const chgSign = r.chgPct >= 0 ? '▲' : '▼';
    return `
      <button class="screen-card text-left bg-rose-50 hover:bg-rose-100 border border-rose-200 rounded-xl p-3 transition" data-code="${r.code}">
        <div class="flex items-center justify-between gap-2 mb-1">
          <div class="font-black text-slate-800 text-sm truncate">${r.name}</div>
          ${star}
        </div>
        <div class="font-mono text-xs text-slate-500 mb-1.5">${r.code}</div>
        <div class="flex items-baseline gap-2 mb-1.5">
          <span class="font-black text-slate-800">${r.close.toFixed(2)}</span>
          <span class="text-xs font-bold ${chgCls}">${chgSign} ${Math.abs(r.chgPct).toFixed(2)}%</span>
        </div>
        <div class="text-xs font-bold text-rose-600">${r.action.emoji} ${r.action.tag}</div>
      </button>
    `;
  };

  const cacheTime = (() => {
    try {
      const c = JSON.parse(localStorage.getItem(SCREEN_CACHE_KEY) || 'null');
      if (c) return new Date(c.ts).toLocaleTimeString('zh-TW', { hour12: false });
    } catch {}
    return '';
  })();

  box.innerHTML = `
    <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-2.5 mb-2">
      ${picks.slice(0, 12).map(card).join('')}
    </div>
    <p class="text-xs text-slate-400 text-center pt-1">共找到 ${picks.length} 檔・掃描時間 ${cacheTime}・點擊查看完整分析</p>
  `;

  box.querySelectorAll('.screen-card').forEach(el => {
    el.onclick = () => loadStock(el.dataset.code);
  });
}

async function initScreening(forceRefresh = false) {
  const box = document.getElementById('screenContent');
  if (forceRefresh) {
    box.innerHTML = `<div class="text-sm text-slate-500 text-center py-3"><span class="loader inline-block align-middle mr-2"></span>正在掃描熱門 30 檔…</div>`;
  }
  try {
    const results = await getScreening(forceRefresh);
    renderScreening(results);
  } catch (err) {
    box.innerHTML = `<p class="text-sm text-red-500 text-center py-2">掃描失敗，請稍後重試。</p>`;
  }
}

// ============================================================
// 主流程
// ============================================================
async function loadStock(code) {
  code = String(code).trim().toUpperCase();
  if (!code) return;

  // 清除上一檔股票的即時更新計時器
  if (liveTimer) { clearInterval(liveTimer); liveTimer = null; }

  const result = document.getElementById('resultSection');
  document.getElementById('emptyState').classList.add('hidden');
  result.innerHTML = `<div class="bg-white rounded-2xl shadow-sm p-8 text-center">
    <div class="loader mx-auto"></div>
    <p class="text-sm text-slate-500 mt-3">正在抓取 ${code} 的資料…</p>
  </div>`;

  try {
    const [rows, info] = await Promise.all([
      fetchPriceData(code),
      getStockInfo(code).catch(() => ({ name: code, industry: '', type: '' }))
    ]);
    const name = info.name;

    // FinMind 由舊到新（已排序）；過濾掉缺值
    const valid = rows.filter(r => r.close != null && r.max != null && r.min != null && r.open != null);
    if (valid.length < 30) throw new Error('資料不足，無法計算指標（需至少 30 個交易日）');

    const cTs = valid.map(r => Math.floor(new Date(r.date + 'T00:00:00+08:00').getTime() / 1000));
    const cO  = valid.map(r => r.open);
    const cH  = valid.map(r => r.max);
    const cL  = valid.map(r => r.min);
    const cC  = valid.map(r => r.close);
    const cV  = valid.map(r => r.Trading_Volume);

    const last = valid[valid.length - 1];
    const prev = valid[valid.length - 2] || { close: last.close };
    const meta = {
      longName: name,
      industry: info.industry || '',
      market: info.type === 'twse' ? '上市' : info.type === 'tpex' ? '上櫃' : '',
      regularMarketPrice: last.close,
      chartPreviousClose: prev.close,
      previousClose: prev.close,
      lastDate: last.date
    };

    const analysis = analyze(cC, cH, cL);
    renderResult(code, meta, cTs, cO, cH, cL, cC, cV, analysis);
  } catch (err) {
    result.innerHTML = `<div class="bg-red-50 border border-red-200 rounded-2xl p-6 text-center">
      <div class="text-3xl mb-2">😢</div>
      <p class="text-red-700 font-bold">查詢失敗</p>
      <p class="text-sm text-red-600 mt-1">${err.message || '請稍後再試'}</p>
      <p class="text-xs text-slate-500 mt-3">提示：請確認是台股代號（4 位數字），上市與上櫃均支援。若 API 暫時忙碌，稍候再試即可。</p>
    </div>`;
  }
}

// ============================================================
// 事件
// ============================================================
document.getElementById('searchForm').addEventListener('submit', (e) => {
  e.preventDefault();
  const code = document.getElementById('stockInput').value.trim();
  if (code) loadStock(code);
});

document.querySelectorAll('.quick-btn').forEach(btn => {
  btn.onclick = () => {
    document.getElementById('stockInput').value = btn.dataset.code;
    loadStock(btn.dataset.code);
  };
});

document.getElementById('clearPins').onclick = () => {
  if (confirm('確定清空所有釘選的股票？')) {
    setPins([]);
    renderPins();
  }
};

document.getElementById('refreshScreen').onclick = () => initScreening(true);

// 啟動
renderPins();
initScreening();
const params = new URLSearchParams(location.search);
const initStock = params.get('stock');
if (initStock) {
  document.getElementById('stockInput').value = initStock;
  loadStock(initStock);
}
</script>
